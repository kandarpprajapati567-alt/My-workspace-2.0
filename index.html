<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K.K. Jarvis OS - Cinematic Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.1.1/model-viewer.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            color: #00ffff;
        }

        /* 1. Cinematic Video Background */
        #bg-video {
            position: absolute;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translate(-50%, -50%);
            z-index: -2;
            opacity: 0.6;
            filter: contrast(1.2) brightness(0.5);
            transition: filter 2s ease;
        }

        /* Ambient Glow Layer */
        #glow-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 20%, #000000 90%);
            z-index: -1;
        }

        /* 2. Hidden 3D Iron Man Model */
        #ironman-model {
            width: 100vw; height: 100vh;
            position: absolute;
            top: 0; left: 0;
            z-index: 5;
            opacity: 0; /* Hidden initially */
            transform: scale(0.1) translateY(500px); /* Pushed back in space */
            filter: drop-shadow(0 0 50px rgba(255, 50, 50, 0.8));
        }

        /* 3. Holographic Floating UI (Hidden initially) */
        .hud-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .hologram-ring {
            position: absolute;
            top: 50%; left: 50%;
            width: 800px; height: 800px;
            border: 2px dashed rgba(0, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.2) inset;
            animation: rotateRing 20s linear infinite;
        }

        @keyframes rotateRing { 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        /* Subjects & Settings Nodes */
        .data-node {
            position: absolute;
            background: rgba(0, 20, 40, 0.6);
            border: 1px solid #00ffff;
            padding: 15px 30px;
            border-radius: 5px;
            backdrop-filter: blur(10px);
            opacity: 0;
            pointer-events: auto;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            transition: all 0.3s ease;
        }
        .data-node:hover { background: rgba(0, 255, 255, 0.3); transform: scale(1.1); }

        /* Positioning the Nodes Cinematically around center */
        #node-samhita { top: 20%; left: 15%; }
        #node-rachana { top: 40%; left: 10%; }
        #node-kriya { top: 60%; left: 15%; }
        #node-sanskrit { top: 20%; right: 15%; }
        #node-padartha { top: 40%; right: 10%; }
        #node-exam { top: 60%; right: 15%; border-color: red; color: red; box-shadow: 0 0 20px red; }
        #node-shloka { top: 80%; left: 50%; transform: translateX(-50%); border-color: #e020ff; color: #e020ff; box-shadow: 0 0 20px #e020ff;}

        /* Settings Panel */
        #settings-panel {
            position: absolute; top: 20px; right: 20px;
            border: 1px solid #aaa; padding: 20px; background: rgba(0,0,0,0.8);
            opacity: 0; pointer-events: none;
        }

        #status-text {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            font-size: 1.5rem; text-shadow: 0 0 10px #00ffff; z-index: 20;
        }
    </style>
</head>
<body>

    <video id="bg-video" autoplay loop muted playsinline>
        <source src="https://cdn.pixabay.com/video/2020/05/25/40131-424902148_large.mp4" type="video/mp4">
    </video>
    <div id="glow-overlay"></div>

    <model-viewer 
        id="ironman-model"
        src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/SciFiHelmet/glTF-Binary/SciFiHelmet.glb" 
        camera-controls auto-rotate rotation-per-second="10deg"
        environment-image="neutral" shadow-intensity="2" exposure="1">
    </model-viewer>

    <div class="hud-container">
        <div class="hologram-ring" id="ring1"></div>
        <div class="data-node" id="node-samhita">Samhita</div>
        <div class="data-node" id="node-rachana">Rachana Sharir</div>
        <div class="data-node" id="node-kriya">Kriya Sharir</div>
        <div class="data-node" id="node-sanskrit">Sanskrit</div>
        <div class="data-node" id="node-padartha">Padartha Vigyana</div>
        <div class="data-node" id="node-exam">Exam Vault</div>
        <div class="data-node" id="node-shloka" style="transform: translateX(-50%);">Shloka Library</div>
    </div>

    <div id="settings-panel">
        <h3 style="color:white; margin-bottom: 10px;">MIC SETTINGS</h3>
        <p>Current: <span id="mic-status" style="color:#00ff00;">STANDBY</span></p>
    </div>

    <div id="status-text">SYSTEM STANDBY. WAITING FOR VOICE COMMAND.</div>

    <script>
        // --- 1. DUAL CONVERSATION ENGINE (TTS & STT) ---
        const synth = window.speechSynthesis;
        let isSystemActive = false;

        function jarvisSpeak(text, callback) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.pitch = 0.8; // Deep voice
            utterance.rate = 1.0;  // Normal speed
            // When Jarvis finishes speaking, execute callback (e.g., to restart listening)
            utterance.onend = function() {
                if(callback) callback();
            };
            synth.speak(utterance);
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.lang = 'en-IN';
        
        let micTimer;
        let micMode = "2_MINS"; // Default

        // --- 2. CINEMATIC BOOT SEQUENCE (Triggered by Voice) ---
        function activateCinematicIronMan() {
            if(isSystemActive) return;
            isSystemActive = true;

            document.getElementById('status-text').innerText = "SYSTEM ACTIVE: ACADEMY HUB ONLINE";
            document.getElementById('bg-video').style.filter = "contrast(1.5) brightness(1) hue-rotate(180deg)";

            // Jarvis responds first
            jarvisSpeak("Command accepted, K.K. Activating Iron Man protocol and syncing your academy files. Welcome back, sir.", function() {
                // Animation happens AS/AFTER he speaks
                // 1. Bring in the 3D Model from deep space
                gsap.to("#ironman-model", { 
                    opacity: 1, scale: 1, y: 0, 
                    duration: 3, ease: "power4.out" 
                });
                
                // 2. Expand Hologram Ring
                gsap.to("#ring1", { scale: 1, duration: 2, ease: "back.out(1.7)" });

                // 3. Pop in the Subject Nodes one by one (Stagger effect)
                gsap.to(".data-node", { 
                    opacity: 1, scale: 1, 
                    duration: 0.8, stagger: 0.2, ease: "power3.out", delay: 1 
                });
            });
        }

        // --- 3. VOICE LOGIC & SETTINGS PROCESSING ---
        recognition.onresult = function(event) {
            const current = event.resultIndex;
            const transcript = event.results[current][0].transcript.toLowerCase();
            console.log("Heard: " + transcript);

            // A. Trigger the Cinematic Boot
            if (transcript.includes("command dashboard activate") || transcript.includes("open iron man")) {
                activateCinematicIronMan();
            }

            // B. Dual Conversation Example (You talk, it answers)
            else if (transcript.includes("how are the systems") || transcript.includes("status report")) {
                recognition.stop(); // Stop listening while Jarvis talks
                jarvisSpeak("All systems are running at maximum efficiency. Exams vault is secure, and Shloka library is fully indexed. What would you like to study today?", function() {
                    if(micMode !== "OFF") recognition.start(); // Resume listening
                });
            }

            // C. Voice Settings Control & Visual Feedback
            else if (transcript.includes("open settings")) {
                gsap.to("#settings-panel", {opacity: 1, duration: 0.5, pointerEvents: "auto"});
                jarvisSpeak("Settings panel is now visible on your screen.");
            }
            else if (transcript.includes("close settings")) {
                gsap.to("#settings-panel", {opacity: 0, duration: 0.5, pointerEvents: "none"});
            }
            else if (transcript.includes("make mic always on")) {
                micMode = "ALWAYS_ON";
                clearTimeout(micTimer);
                document.getElementById('mic-status').innerText = "ALWAYS ON";
                jarvisSpeak("Microphone restrictions lifted. I will be listening continuously.");
            }
            else if (transcript.includes("set mic for 10 minutes")) {
                micMode = "10_MINS";
                clearTimeout(micTimer);
                document.getElementById('mic-status').innerText = "10 MINS";
                jarvisSpeak("Microphone timer set to 10 minutes.");
                micTimer = setTimeout(() => {
                    micMode = "OFF";
                    recognition.stop();
                    jarvisSpeak("10 minutes elapsed. Microphone is going offline.");
                    document.getElementById('mic-status').innerText = "OFFLINE";
                }, 600000);
            }
        };

        // Keeps Mic active if it crashes, UNLESS it's explicitly turned OFF
        recognition.onend = function() {
            if (micMode !== "OFF" && isSystemActive) {
                try { recognition.start(); } catch(e) {}
            }
        };

        // Start listening initially
        recognition.start();

    </script>
</body>
</html>
