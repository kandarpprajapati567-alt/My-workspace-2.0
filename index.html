<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K.K. Jarvis OS - Cinematic Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.1.1/model-viewer.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #00ffff; }

        /* Cinematic Video Background */
        #bg-video {
            position: absolute; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            transform: translate(-50%, -50%); z-index: -2;
            opacity: 0.6; filter: contrast(1.2) brightness(0.5);
            transition: filter 2s ease;
        }

        /* 3D Model - Hidden initially */
        #ironman-model {
            width: 100vw; height: 100vh; position: absolute;
            top: 0; left: 0; z-index: 5; opacity: 0;
            transform: scale(0.1) translateY(500px);
            filter: drop-shadow(0 0 50px rgba(0, 255, 255, 0.5));
        }

        /* Holographic UI */
        .hud-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        .hologram-ring {
            position: absolute; top: 50%; left: 50%; width: 800px; height: 800px;
            border: 2px dashed rgba(0, 255, 255, 0.3); border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.2) inset;
            animation: rotateRing 20s linear infinite;
        }
        @keyframes rotateRing { 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        .data-node {
            position: absolute; background: rgba(0, 20, 40, 0.6);
            border: 1px solid #00ffff; padding: 15px 30px; border-radius: 5px;
            backdrop-filter: blur(10px); opacity: 0; pointer-events: auto;
            text-transform: uppercase; font-weight: bold; letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5); transition: all 0.3s ease;
        }
        .data-node:hover { background: rgba(0, 255, 255, 0.3); transform: scale(1.1); cursor: pointer; }

        /* BAMS Subjects & Vaults Positions */
        #node-samhita { top: 20%; left: 15%; }
        #node-rachana { top: 40%; left: 10%; }
        #node-kriya { top: 60%; left: 15%; }
        #node-sanskrit { top: 20%; right: 15%; }
        #node-padartha { top: 40%; right: 10%; }
        #node-exam { top: 60%; right: 15%; border-color: red; color: red; box-shadow: 0 0 20px red; }
        #node-shloka { top: 80%; left: 50%; transform: translateX(-50%); border-color: #e020ff; color: #e020ff; box-shadow: 0 0 20px #e020ff;}

        #status-text {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            font-size: 1.5rem; text-shadow: 0 0 10px #00ffff; z-index: 20; text-align: center; width: 80%;
        }
        #mic-status-badge {
            position: absolute; top: 20px; right: 20px; color: #00ff00; border: 1px solid #00ff00; padding: 5px 10px; z-index: 20;
        }
    </style>
</head>
<body>

    <video id="bg-video" autoplay loop muted playsinline>
        <source src="https://cdn.pixabay.com/video/2020/05/25/40131-424902148_large.mp4" type="video/mp4">
    </video>

    <model-viewer 
        id="ironman-model"
        src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/SciFiHelmet/glTF-Binary/SciFiHelmet.glb" 
        camera-controls auto-rotate rotation-per-second="10deg"
        environment-image="neutral" shadow-intensity="2" exposure="1">
    </model-viewer>

    <div class="hud-container">
        <div class="hologram-ring" id="ring1"></div>
        <div class="data-node" id="node-samhita">Samhita</div>
        <div class="data-node" id="node-rachana">Rachana Sharir</div>
        <div class="data-node" id="node-kriya">Kriya Sharir</div>
        <div class="data-node" id="node-sanskrit">Sanskrit</div>
        <div class="data-node" id="node-padartha">Padartha Vigyana</div>
        <div class="data-node" id="node-exam">Exam Vault</div>
        <div class="data-node" id="node-shloka" style="transform: translateX(-50%);">Shloka Library</div>
    </div>

    <div id="mic-status-badge">MIC: STANDBY</div>
    <div id="status-text">SYSTEM STANDBY. SAY "K.K. COMMAND DASHBOARD ACTIVATE"</div>

    <script>
        const statusText = document.getElementById('status-text');
        const micBadge = document.getElementById('mic-status-badge');
        let isSystemActive = false;
        let isSpeaking = false;

        // TTS Engine
        const synth = window.speechSynthesis;
        function jarvisSpeak(text, callback) {
            isSpeaking = true;
            statusText.innerText = "JARVIS: " + text;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.pitch = 0.8;
            utterance.rate = 1.0;
            utterance.onend = () => {
                isSpeaking = false;
                statusText.innerText = "SYSTEM ACTIVE: LISTENING...";
                if(callback) callback();
            };
            synth.speak(utterance);
        }

        // STT Engine (Speech Recognition)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.lang = 'en-IN';

        // Cinematic Boot Sequence
        function activateSystem() {
            if(isSystemActive) return;
            isSystemActive = true;
            
            document.getElementById('bg-video').style.filter = "contrast(1.5) brightness(1) hue-rotate(180deg)";
            
            jarvisSpeak("System activated. Booting up Iron Man interface and syncing BAMS academic vaults. Welcome back, K.K.", () => {
                // GSAP Animations trigger AFTER he stops speaking the welcome line
                gsap.to("#ironman-model", { opacity: 1, scale: 1, y: 0, duration: 2.5, ease: "power4.out" });
                gsap.to("#ring1", { scale: 1, duration: 1.5, ease: "back.out(1.7)" });
                gsap.to(".data-node", { opacity: 1, scale: 1, duration: 0.6, stagger: 0.15, ease: "power3.out", delay: 0.5 });
                resumeMic();
            });
        }

        // Send Command to Node.js Backend
        async function sendToJarvis(prompt) {
            recognition.stop(); // Stop listening while processing
            statusText.innerText = "JARVIS IS THINKING...";
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: prompt })
                });
                const data = await response.json();
                
                jarvisSpeak(data.reply, () => {
                    resumeMic(); // Start listening again after speaking
                });
            } catch (error) {
                console.error(error);
                jarvisSpeak("Sir, server connection failed.", () => resumeMic());
            }
        }

        function resumeMic() {
            if(!isSpeaking) {
                try { recognition.start(); micBadge.innerText = "MIC: LISTENING"; } catch(e) {}
            }
        }

        recognition.onresult = (event) => {
            const current = event.resultIndex;
            const transcript = event.results[current][0].transcript.toLowerCase();
            console.log("Heard:", transcript);

            if (transcript.includes("command dashboard activate") || transcript.includes("open iron man")) {
                recognition.stop();
                activateSystem();
            } else if (isSystemActive && !isSpeaking) {
                sendToJarvis(transcript); // Any other command goes to the AI
            }
        };

        recognition.onend = () => {
            micBadge.innerText = "MIC: OFFLINE";
            // Auto-restart logic if system is active and Jarvis isn't speaking
            if (isSystemActive && !isSpeaking) {
                setTimeout(resumeMic, 500);
            }
        };

        // Start Mic on Load
        recognition.start();
        micBadge.innerText = "MIC: LISTENING";
    </script>
</body>
</html>
