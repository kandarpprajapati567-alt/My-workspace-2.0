<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K.K. Personal Dashboard</title>
    <style>
        /* Dark Universe Background Theme */
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            background-image: radial-gradient(circle at center, #0a0514 0%, #000000 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Glassmorphism Panel (Like your photo references) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px;
            width: 85%;
            max-width: 800px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.8s ease-in-out;
            pointer-events: none; /* Disabled until activated */
        }

        .active-panel {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
            box-shadow: 0 0 40px rgba(0, 150, 255, 0.2);
        }

        /* Subject Cards */
        .subject-cards {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .card {
            background: rgba(0, 150, 255, 0.05);
            border: 1px solid rgba(0, 150, 255, 0.2);
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            flex: 1;
            min-width: 120px;
        }

        .card:hover {
            background: rgba(0, 150, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 150, 255, 0.4);
            transform: translateY(-5px);
        }

        h1 {
            color: #00d2ff;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }
    </style>
</head>
<body>

    <!-- Iron Man Academy Hub -->
    <div id="ironManHub" class="glass-panel">
        <h1>Iron Man: Academy Hub</h1>
        <p>Welcome back, K.K. All systems online.</p>
        
        <div class="subject-cards">
            <div class="card">📚 Samhitas</div>
            <div class="card">🧬 Rachana Sharir</div>
            <div class="card">🧠 Kriya Sharir</div>
        </div>
        
        <div id="aiResponse" style="margin-top: 25px; color: #00ffcc; font-style: italic;"></div>
    </div>

    <script>
        // --- VOICE RECOGNITION LOGIC ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        
        recognition.continuous = true;
        recognition.lang = 'en-IN'; // Set to Indian English for better accent detection

        recognition.onresult = function(event) {
            const current = event.resultIndex;
            const transcript = event.results[current][0].transcript.toLowerCase();
            console.log("Heard: " + transcript);

            // The Trigger Command
            if (transcript.includes("command dashboard activate")) {
                activateIronMan();
            }
        };

        function activateIronMan() {
            document.getElementById('ironManHub').classList.add('active-panel');
            speak("Academy Hub activated. Ready for your commands, K.K.");
        }

        // --- TEXT TO SPEECH (System Voice) ---
        function speak(text) {
            const synth = window.speechSynthesis;
            const utterance = new SpeechSynthesisUtterance(text);
            synth.speak(utterance);
        }

        // --- 2 MINUTE MIC TIMER LOGIC ---
        recognition.start();
        console.log("Mic is listening for the trigger word...");
        
        setTimeout(() => {
            recognition.stop();
            console.log("Mic turned off after 2 minutes to save battery.");
        }, 120000); // 120,000 ms = 2 minutes

        // --- GEMINI API PLACEHOLDER ---
        async function askGemini(prompt) {
            // Function ready to connect your Gemini API Key
        }
    </script>
</body>
</html>
