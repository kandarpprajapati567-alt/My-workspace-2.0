<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K.K. Command Center | Pro Ultra</title>
    <style>
        :root { 
            --glow-focus: #00ff88; 
            --glow-break: #00d4ff; 
            --glow-trade: #ffaa00;
            --bg-alpha: 0.85;
            --main-transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        body { 
            background-color: #050505; 
            color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden;
            transition: background 0.5s ease;
        }

        /* Cinematic Background Elements */
        #canvas-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none;
        }
        .cinematic-vignette {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, transparent 40%, rgba(0, 0, 0, 0.95) 100%);
            z-index: 1; pointer-events: none;
        }
        .bg-image-mode {
            background: linear-gradient(rgba(5, 5, 5, var(--bg-alpha)), rgba(5, 5, 5, var(--bg-alpha))), 
                        url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop');
            background-size: cover; background-position: center; background-attachment: fixed;
        }

        /* Z-index adjustments to sit above background */
        .left-sidebar, .main-wrapper, .header-bar { position: relative; z-index: 10; }

        /* LEFT TOOLBAR */
        .left-sidebar {
            position: fixed; left: 0; top: 0; bottom: 0; width: 65px;
            background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255,255,255,0.1); z-index: 2500;
            display: flex; flex-direction: column; align-items: center; padding-top: 20px; box-shadow: 5px 0 20px rgba(0,0,0,0.5);
        }
        .icon-btn { font-size: 1.8em; cursor: pointer; margin-bottom: 25px; opacity: 0.5; transition: 0.3s; width: 100%; text-align: center; padding: 10px 0; }
        .icon-btn:hover, .icon-btn.active { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 10px var(--glow-focus)); border-left: 3px solid var(--glow-focus); background: rgba(255,255,255,0.05); }

        /* Main Content Wrapper */
        .main-wrapper { margin-left: 65px; flex: 1; display: flex; flex-direction: column; height: 100vh; width: calc(100% - 65px); position: relative; transition: box-shadow 1s ease-in-out; }
        
        /* Header & Timer */
        .header-bar { height: 70px; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; border-bottom: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); z-index: 1500; }
        .timer-controls { display: flex; align-items: center; gap: 20px; }
        .mode-badge { padding: 8px 15px; border-radius: 25px; font-weight: bold; border: 2px solid var(--glow-focus); color: var(--glow-focus); transition: var(--main-transition); letter-spacing: 1px; font-size: 0.9em; }
        .btn-timer { background: transparent; color: white; border: 1px solid #666; padding: 8px 20px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn-timer:hover { background: rgba(255,255,255,0.1); }

        @keyframes timerPulse { 0% { text-shadow: 0 0 5px currentColor; transform: scale(1); } 50% { text-shadow: 0 0 20px currentColor, 0 0 30px currentColor; transform: scale(1.05); } 100% { text-shadow: 0 0 5px currentColor; transform: scale(1); } }
        .timer-running { animation: timerPulse 2s infinite ease-in-out; color: var(--glow-focus); }

        /* Welcome Home Screen */
        .home-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; z-index: 10; }
        .home-screen h1 { font-size: 3em; font-weight: 300; margin: 0; letter-spacing: 2px; }
        .home-screen p { color: #aaa; font-size: 1.2em; margin-top: 10px; }

        /* FULL SCREEN MODULE OVERLAYS */
        .module-overlay { display: none; position: absolute; top: 70px; left: 0; right: 0; bottom: 0; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(25px); z-index: 1000; overflow-y: auto; padding: 30px 40px; animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .close-module-btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid #444; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; float: right; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .close-module-btn:hover { background: #ff4444; border-color: #ff4444; }
        .module-title { font-weight: 300; margin-top: 0; font-size: 2em; margin-bottom: 20px; }

        /* General Reusable Styles */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: rgba(255,255,255,0.03); padding: 30px 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.05); transition: var(--main-transition); cursor: pointer; backdrop-filter: blur(10px); position: relative; }
        .card:hover { transform: translateY(-5px); border-color: var(--glow-focus); background: rgba(255,255,255,0.08); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .icon { font-size: 40px; display: block; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        .input-field { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid #444; border-radius: 8px; color: white; margin-bottom: 15px; box-sizing: border-box; font-family: inherit; }
        
        /* Popup Modal */
        .popup-modal { display: none; position: fixed; top: 10%; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px; background: rgba(15,15,15,0.95); backdrop-filter: blur(20px); padding: 30px; border-radius: 20px; border: 1px solid var(--glow-focus); z-index: 3000; box-shadow: 0 20px 50px rgba(0,0,0,0.9); max-height: 80vh; overflow-y: auto; }
        .overlay-bg { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index: 2999; }

        /* Tasks & Layouts */
        .task-list { list-style: none; padding: 0; margin: 0; }
        .task-item { background: rgba(255,255,255,0.05); padding: 15px 20px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--glow-focus); flex-wrap: wrap; gap: 10px; }
        .del-btn { background: rgba(255,68,68,0.2); border: 1px solid #ff4444; color: #ff4444; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .del-btn:hover { background: #ff4444; color: white; }
        .add-card { border: 2px dashed #555; background: transparent; }
        .add-card:hover { border-color: var(--glow-focus); background: rgba(0,255,136,0.05); }
        .delete-card { position: absolute; top: 10px; right: 10px; background: rgba(255,0,0,0.5); border-radius: 50%; width: 25px; height: 25px; font-size: 12px; border: none; color: white; cursor: pointer; display: none; }
        .card:hover .delete-card { display: block; }
        .back-btn { background: rgba(0,0,0,0.5); color: white; border: 1px solid #555; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; transition: 0.3s; display: inline-flex; align-items: center; gap: 10px; font-weight: bold; }
        .back-btn:hover { border-color: var(--glow-focus); color: var(--glow-focus); }

        /* TRADING AREA */
        .flex-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; align-items: stretch; }
        .flex-col { display: flex; flex-direction: column; }
        .chart-col { flex: 100%; min-width: 0; }
        .side-col-wrapper { display: flex; gap: 20px; width: 100%; flex-wrap: wrap;} 
        .side-col { flex: 1; min-width: 300px; display: flex; flex-direction: column; }
        .panel { background: rgba(0,0,0,0.6); padding: 20px; border-radius: 15px; border: 1px solid #333; display: flex; flex-direction: column; box-sizing: border-box; flex-grow: 1; }
        .chart-container { width: 100%; height: 55vh; min-height: 400px; border-radius: 10px; overflow: hidden; border: 1px solid #444; flex-grow: 1; position: relative; }
        .ai-output-box { margin-top:15px; font-size:0.9em; color:#ddd; background:rgba(0,0,0,0.4); padding:15px; border-radius:8px; display:none; border-left: 3px solid var(--glow-focus); line-height: 1.5; max-height: 200px; overflow-y: auto;}

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .left-sidebar { width: 50px; }
            .main-wrapper { margin-left: 50px; width: calc(100% - 50px); }
            .header-bar { padding: 0 10px; height: 60px; }
            .timer-controls { gap: 10px; }
            .mode-badge { padding: 5px 10px; font-size: 0.7em; letter-spacing: 0; }
            #timer-display { font-size: 1.4em !important; }
            .btn-timer { padding: 5px 10px; font-size: 0.8em; }
            #desktop-logo { display: none; }
            .grid-container { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .card { padding: 15px 10px; border-radius: 12px; }
            .icon { font-size: 30px; margin-bottom: 8px; }
            .card h3 { font-size: 0.9em; margin: 0; }
            .flex-row { flex-direction: column; gap: 15px; }
            .chart-col, .side-col { flex: none; width: 100%; min-width: unset; }
            .chart-container { height: 45vh; min-height: 350px; } 
        }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>
    <div class="cinematic-vignette"></div>

    <div class="left-sidebar" id="sidebar">
        <div class="icon-btn" onclick="openModule('workspace', this)" title="Digital Workspace">🚀</div>
        <div class="icon-btn" onclick="openModule('trading', this)" title="Live
