<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K.K. Ultimate HUD | Master Interface</title>
    <style>
        :root {
            --theme-color: #00ffaa;
            --bg-color: #020205;
            --glass-bg: rgba(10, 10, 15, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition-hq: 0.4s cubic-bezier(0.25, 1, 0.2, 1);
            --card-text: #fff;
            --scanline-opacity: 0.08;
        }

        body.light-theme {
            --bg-color: #e8ecf1;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(0, 136, 255, 0.3);
            --card-text: #111;
            --theme-color: #0088ff;
            --scanline-opacity: 0.03;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--card-text);
            font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden;
            user-select: none; transition: all 0.5s ease;
        }

        /* Cinematic Scanline Hologram */
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 99999; background-size: 100% 4px, 6px 100%; pointer-events: none; opacity: var(--scanline-opacity);
        }

        /* 3D Cinematic Cards */
        .carousel-container { display: flex; gap: 40px; padding: 50px; max-width: 100vw; overflow-x: auto; scrollbar-width: none; align-items: center; perspective: 1200px; }
        .avenger-card {
            min-width: 280px; height: 400px; background-size: cover; background-position: center;
            border: 1px solid var(--glass-border); border-radius: 25px; padding: 25px;
            display: flex; flex-direction: column; justify-content: space-between; align-items: center;
            cursor: pointer; position: relative; overflow: hidden; transform-style: preserve-3d; 
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.6s, border-color 0.6s;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }
        .avenger-card::before { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to bottom, rgba(0,0,0,0.2) 20%, rgba(0,0,0,0.85) 100%); z-index: 1; transition: 0.4s; }
        .avenger-card:hover { transform: translateY(-12px) rotateY(12deg) scale(1.05); box-shadow: 0 35px 60px rgba(0,0,0,0.8), 0 0 30px currentColor; border-color: currentColor; }
        .card-content { z-index: 2; text-align: center; transform: translateZ(30px); }
        .card-icon { font-size: 3.5rem; filter: drop-shadow(0 0 20px currentColor); z-index: 2; transform: translateZ(40px); transition: 0.3s; }

        /* UI Utilities */
        .sidebar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: max-content; padding: 10px 20px; gap: 12px; z-index: 1000; background: var(--glass-bg); backdrop-filter: blur(35px); border: 1px solid var(--glass-border); border-radius: 50px; display: flex; align-items: center; transition: 0.3s; }
        .nav-btn { font-size: 1.4rem; cursor: pointer; opacity: 0.5; width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: var(--transition-hq); color: inherit; }
        .nav-btn.active { opacity: 1; transform: translateY(-6px); background: rgba(255, 255, 255, 0.12); box-shadow: 0 10px 20px rgba(0,0,0,0.4), 0 0 20px var(--theme-color); color: var(--theme-color); border: 1px solid var(--theme-color); }
        
        .content-area { flex: 1; padding: 40px 40px 130px 40px; overflow-y: auto; position: relative; z-index: 10; transition: opacity 0.4s ease; }
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 20px; }
        .tool-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 22px; cursor: pointer; transition: var(--transition-hq); backdrop-filter: blur(20px); }
        .tool-card:hover { border-color: var(--theme-color); transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        
        .action-btn { background: rgba(0,0,0,0.4); border: 1px solid var(--theme-color); color: #fff; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .action-btn:hover { background: var(--theme-color); color: #000; box-shadow: 0 0 20px var(--theme-color); transform: scale(1.05); }
        
        /* Overlays */
        .overlay-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 15000; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; backdrop-filter: blur(25px); opacity: 0; transition: 0.4s; }
        .modal-box { background: var(--glass-bg); border: 1px solid var(--theme-color); border-radius: 20px; padding: 35px; width: 650px; max-width: 92%; box-shadow: 0 25px 50px rgba(0,0,0,0.9); }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.4rem; cursor: pointer; color: var(--theme-color); transition: 0.3s; }
        
        /* Mic Bar */
        #mic-status { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 28px; background: rgba(5, 5, 8, 0.85); border: 1px solid var(--theme-color); border-radius: 30px; z-index: 20000; color: var(--theme-color); font-weight: bold; backdrop-filter: blur(15px); font-size: 0.85rem; letter-spacing: 1px; transition: all 0.4s ease; display: flex; align-items: center; gap: 15px; }
        .pulse-active { animation: jarvisBreathe 1.4s infinite alternate ease-in-out; }
        @keyframes jarvisBreathe { 0% { box-shadow: 0 0 15px rgba(0, 255, 170, 0.2); } 100% { box-shadow: 0 0 30px var(--theme-color); transform: translateX(-50%) scale(1.02); } }
        
        .manual-mic-toggle { background: var(--theme-color); color: #000; border: none; padding: 4px 12px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.75rem; transition: 0.3s; }
        .manual-mic-toggle.off { background: #ff2a2a; color: #fff; }

        #landing-stage, #dashboard-stage { height: 100vh; width: 100vw; display: flex; transition: all 0.5s ease; }
        #landing-stage { flex-direction: column; justify-content: center; align-items: center; }
        #dashboard-stage { display: none; opacity: 0; flex-direction: column; }
    </style>
</head>
<body>

    <!-- Holographic Engine Mic HUD -->
    <div id="mic-status">
        <span id="mic-text">🔴 AI ENGINE STANDBY</span>
        <button id="mic-toggle-btn" class="manual-mic-toggle off" onclick="handleMicManualSwitch()">ACTIVATE MIC</button>
    </div>

    <!-- Terminal Overlay for Responses -->
    <div class="overlay-modal" id="jarvis-terminal-overlay">
        <div class="modal-box" style="width: 750px;">
            <span class="close-btn" onclick="closeModal('jarvis-terminal-overlay')">✕</span>
            <h2 style="color: var(--theme-color);">⚡ RESPONSE MATRIX</h2>
            <hr style="border:0; border-top: 1px solid rgba(255,255,255,0.1); margin:15px 0;">
            <div id="jarvis-hud-text" style="font-family: monospace; font-size: 1.1rem; line-height: 1.6; white-space: pre-wrap;"></div>
        </div>
    </div>

    <!-- System Config Overlay -->
    <div class="overlay-modal" id="settings-overlay">
        <div class="modal-box" style="width: 500px;">
            <span class="close-btn" onclick="closeModal('settings-overlay')">✕</span>
            <h2 style="color: var(--theme-color);">⚙️ SYSTEM OVERLOAD MATRIX</h2>
            <div style="display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 20px;">
                <label>Theme Parameters</label>
                <select id="theme-selector" onchange="adjustSystemTheme()" style="padding: 10px; background: rgba(0,0,0,0.5); color: white; border: 1px solid var(--theme-color);">
                    <option value="dark">Cyberpunk Dark Horizon</option>
                    <option value="light">Stark Lab Light Mode</option>
                </select>
                
                <label>AI Mode</label>
                <select id="assistant-mode-selector" style="padding: 10px; background: rgba(0,0,0,0.5); color: white; border: 1px solid var(--theme-color);">
                    <option value="teacher" selected>Personal Teacher (BAMS/Trading)</option>
                    <option value="general">Standard Assistant</option>
                </select>
            </div>
            <button class="action-btn" style="margin-top: 25px; width:100%;" onclick="closeModal('settings-overlay')">APPLY SETTINGS</button>
        </div>
    </div>

    <!-- Landing Stage -->
    <div id="landing-stage">
        <div style="text-align: center; margin-bottom: 4vh;">
            <h2 style="color: #777; font-size:0.85rem; letter-spacing:4px;">K.K. MASTER HUD v8.0</h2>
            <h1 style="margin: 0; font-weight: 300; text-transform: uppercase;">Select <span style="color: var(--theme-color); font-weight: 900;">System Protocol</span></h1>
        </div>
        
        <div class="carousel-container">
            <div class="avenger-card" style="color: #ff2a2a; background-image: url('https://images.unsplash.com/photo-1608889174637-3c99800e1791?q=80&w=600');" onclick="initProtocol('ironman', '#ff2a2a')">
                <div class="card-icon">🚀</div>
                <div class="card-content"><h3>IRON MAN</h3><p style="color:#aaa; font-size:0.8rem;">Academic Matrix (BAMS)</p></div>
            </div>
            <div class="avenger-card" style="color: #0077ff; background-image: url('https://images.unsplash.com/photo-1569003339405-ea396a5a8a90?q=80&w=600');" onclick="initProtocol('cap', '#0077ff')">
                <div class="card-icon">🛡️</div>
                <div class="card-content"><h3>CAPTAIN</h3><p style="color:#aaa; font-size:0.8rem;">Tactical Trading Terminal</p></div>
            </div>
        </div>
    </div>

    <!-- Dashboard Stage -->
    <div id="dashboard-stage">
        <div class="sidebar">
            <div class="nav-btn" onclick="returnToHome()" style="opacity: 0.8; border: 1px solid var(--glass-border);">⌂</div>
            <div class="nav-btn" id="nav-ironman" style="color: #ff2a2a;" onclick="switchModule('ironman')">🚀</div>
            <div class="nav-btn" id="nav-cap" style="color: #0077ff;" onclick="switchModule('cap')">🛡️</div>
        </div>
        <div class="content-area" id="main-content"></div>
    </div>

    <script>
        let currentModule = '';
        let engineInstance;
        let jarvisActive = false;

        const modules = {
            ironman: {
                color: '#ff2a2a', title: 'Academic Matrix Blueprint',
                html: `
                    <h3>BAMS Complete Vault System</h3>
                    <div class="grid-layout" style="margin-top:15px;">
                        <div class="tool-card">🦴 <h3>Anatomy</h3><p style="font-size:0.75rem; color:#aaa;">Rachana Sharir Blueprint Data</p></div>
                        <div class="tool-card">🧪 <h3>Physiology</h3><p style="font-size:0.75rem; color:#aaa;">Kriya Sharir Core Manifest</p></div>
                        <div class="tool-card">📜 <h3>Samhita</h3><p style="font-size:0.75rem; color:#aaa;">Classical Literature</p></div>
                        <div class="tool-card">⚛️ <h3>Padarth Vigyan</h3><p style="font-size:0.75rem; color:#aaa;">Fundamental Principles</p></div>
                        <div class="tool-card">🕉️ <h3>Sanskrit</h3><p style="font-size:0.75rem; color:#aaa;">Linguistic Repositories</p></div>
                    </div>`
            },
            cap: { 
                color: '#0077ff', title: 'Tactical Trading Core', 
                html: `
                    <div class="grid-layout">
                        <div class="tool-card" onclick="window.open('https://trade.angelone.in/')">📈 <h3>Angel One Gateway</h3></div>
                        <div class="tool-card" onclick="window.open('https://web.dhan.co/')">⚡ <h3>Dhan Control Mainframe</h3></div>
                    </div>` 
            }
        };

        function initProtocol(id, color) {
            currentModule = id;
            document.documentElement.style.setProperty('--theme-color', color);
            document.getElementById('landing-stage').style.display = 'none';
            document.getElementById('dashboard-stage').style.display = 'flex';
            setTimeout(() => { document.getElementById('dashboard-stage').style.opacity = '1'; renderModule(id); }, 50);
        }

        function returnToHome() {
            document.getElementById('dashboard-stage').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('dashboard-stage').style.display = 'none';
                document.getElementById('landing-stage').style.display = 'flex';
                document.documentElement.style.setProperty('--theme-color', '#00ffaa');
            }, 400);
        }

        function renderModule(id) {
            currentModule = id;
            const mod = modules[id];
            const contentArea = document.getElementById('main-content');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const navBtn = document.getElementById('nav-'+id);
            if(navBtn) navBtn.classList.add('active');

            contentArea.innerHTML = `
                <div style="display:flex; justify-content:space-between; margin-bottom:20px; border-bottom:1px solid rgba(255,255,255,0.08); padding-bottom:10px;">
                    <h2>${mod.title}</h2>
                    <button class="action-btn" onclick="openModal('settings-overlay')">⚙️ SYSTEM SETTINGS</button>
                </div>
                <div>${mod.html}</div>`;
        }

        function switchModule(id) { renderModule(id); }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; setTimeout(()=>document.getElementById(id).style.opacity='1',10); }
        function closeModal(id) { document.getElementById(id).style.opacity='0'; setTimeout(()=>document.getElementById(id).style.display='none',350); }

        function adjustSystemTheme() {
            const val = document.getElementById('theme-selector').value;
            document.body.className = ''; 
            if(val === 'light') document.body.classList.add('light-theme');
        }

        // --- MICROPHONE AND AI LOGIC ---
        function handleMicManualSwitch() {
            if (jarvisActive) { shutdownMic(); } else { startMic(); }
        }

        function startMic() {
            jarvisActive = true;
            document.getElementById('mic-text').innerText = "🟢 AI MIC ENGINE ACTIVE";
            document.getElementById('mic-status').classList.add('pulse-active');
            const btn = document.getElementById('mic-toggle-btn');
            btn.innerText = "SWITCH OFF";
            btn.className = "manual-mic-toggle";
            if(engineInstance) { try { engineInstance.start(); } catch(e){ console.log("Mic already listening"); } }
        }

        function shutdownMic() {
            jarvisActive = false;
            document.getElementById('mic-text').innerText = "🔴 AI ENGINE STANDBY";
            document.getElementById('mic-status').classList.remove('pulse-active');
            const btn = document.getElementById('mic-toggle-btn');
            btn.innerText = "ACTIVATE MIC";
            btn.className = "manual-mic-toggle off";
            if(engineInstance) { try { engineInstance.stop(); } catch(e){} }
        }

        async function triggerGeminiAI(question) {
            const isTeacher = document.getElementById('assistant-mode-selector').value === 'teacher';
            let dynamicPrompt = question;

            // Teacher Mode Formatting
            if (isTeacher) {
                if (currentModule === 'ironman' || question.includes('bams') || question.includes('sharir')) {
                    dynamicPrompt = "Act as my expert personal BAMS Professor. Teach me: " + question;
                } else if (currentModule === 'cap' || question.includes('trade') || question.includes('market')) {
                    dynamicPrompt = "Act as my elite financial trading coach. Analyze or teach me: " + question;
                }
            }

            try {
                console.log("--> Sending Request to Backend API");
                const res = await fetch('/api/agent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: dynamicPrompt, agentType: isTeacher ? "teacher" : "general" })
                });
                
                if (!res.ok) throw new Error(`Server returned ${res.status}`);
                
                const parsed = await res.json();
                return parsed.success ? parsed.message : "Error: " + parsed.message;
            } catch (err) {
                console.error("--> Frontend Fetch Error:", err);
                return "Connection Error: Backend processing failed. Check Render server logs.";
            }
        }

        // Initialize Speech Engine
        const SpeechEngine = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechEngine) {
            engineInstance = new SpeechEngine(); 
            engineInstance.continuous = true; 
            engineInstance.lang = 'en-US'; 
            engineInstance.interimResults = false;
            
            engineInstance.onresult = async function(event) {
                let speechToken = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
                console.log("--> Voice Captured:", speechToken);

                if (!jarvisActive) return;

                // Command Routing
                if (speechToken.includes("open iron man") || speechToken.includes("academic")) { 
                    initProtocol('ironman', '#ff2a2a'); 
                }
                else if (speechToken.includes("open captain") || speechToken.includes("trading")) { 
                    initProtocol('cap', '#0077ff'); 
                }
                else if (speechToken.includes("return to home") || speechToken.includes("go back")) { 
                    returnToHome(); 
                }
                else {
                    // Send to Gemini
                    document.getElementById('mic-text').innerText = "🧠 PROCESSING FEED...";
                    openModal('jarvis-terminal-overlay');
                    document.getElementById('jarvis-hud-text').innerText = "Processing your query...";
                    
                    let aiReply = await triggerGeminiAI(speechToken);
                    
                    document.getElementById('jarvis-hud-text').innerText = aiReply;
                    document.getElementById('mic-text').innerText = "🟢 AI MIC ENGINE ACTIVE";
                }
            };

            // Infinite loop logic to keep mic alive if active
            engineInstance.onend = function() { 
                if(jarvisActive) { 
                    try{ engineInstance.start(); }catch(e){} 
                } 
            }; 
        } else {
            console.error("Speech Recognition not supported in this browser.");
            document.getElementById('mic-text').innerText = "❌ BROWSER MIC NOT SUPPORTED";
        }
    </script>
</body>
</html>
